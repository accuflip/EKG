<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dysrhythmia Quiz</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap');
:root{--bg:#0a0e1a;--sur:#111827;--sur2:#1a2235;--brd:#1e3a5f;--acc:#00d4ff;--ac3:#00ff9d;--tx:#e2e8f0;--mu:#64748b;--ok:#00ff9d;--no:#ff4d6d}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:var(--bg)}
body{min-height:100vh;background:var(--bg);color:var(--tx);font-family:"DM Sans",sans-serif}
body::before{content:"";position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(0,212,255,.04) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(0,212,255,.04) 40px);pointer-events:none;z-index:0}
.wrap{max-width:860px;margin:0 auto;padding:1.5rem 1rem 5rem;position:relative;z-index:1}
.hdr{text-align:center;padding:2rem 0 1.8rem}
.tag{font-family:"Space Mono",monospace;font-size:.62rem;letter-spacing:.22em;color:var(--acc);text-transform:uppercase;background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.2);padding:.3rem .8rem;border-radius:2px;display:inline-block;margin-bottom:1rem}
h1{font-family:"Space Mono",monospace;font-size:clamp(1.4rem,5vw,2.4rem);font-weight:700;line-height:1.15;color:#fff;margin-bottom:.5rem}
h1 em{color:var(--acc);font-style:normal}
.sub{color:var(--mu);font-size:.88rem}
.ecgl{width:100%;max-width:360px;margin:1.1rem auto;height:32px;display:block;opacity:.4}
.ep{stroke-dasharray:300;stroke-dashoffset:300;animation:ed 2s linear infinite}
@keyframes ed{to{stroke-dashoffset:-300}}
.pr{display:flex;justify-content:space-between;font-family:"Space Mono",monospace;font-size:.62rem;color:var(--mu);margin-bottom:.35rem}
.pb{height:3px;background:var(--sur2);border-radius:2px;margin-bottom:1.6rem;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--acc),var(--ac3));border-radius:2px;transition:width .35s;box-shadow:0 0 5px var(--acc);width:0%}
.sl{font-family:"Space Mono",monospace;font-size:.58rem;letter-spacing:.18em;color:var(--acc);text-transform:uppercase;margin:1.6rem 0 .9rem;padding-left:.65rem;border-left:2px solid var(--acc)}
.card{background:var(--sur);border:1px solid var(--brd);border-radius:4px;padding:1.4rem;margin-bottom:.9rem;transition:border-color .2s}
.card.ok{border-color:var(--ok);box-shadow:0 0 14px rgba(0,255,157,.07)}
.card.no{border-color:var(--no);box-shadow:0 0 14px rgba(255,77,109,.07)}
.qn{font-family:"Space Mono",monospace;font-size:.58rem;color:var(--mu);margin-bottom:.55rem}
.qt{font-size:.95rem;font-weight:500;line-height:1.6;color:#f1f5f9;margin-bottom:1rem}
.sw{border:1px solid var(--brd);border-radius:3px;overflow:hidden;background:#0d1117;margin-bottom:1rem}
.sw img{width:100%;height:auto;display:block}
.sl2{font-family:"Space Mono",monospace;font-size:.52rem;color:var(--acc);letter-spacing:.1em;text-transform:uppercase;padding:.32rem .55rem;background:rgba(0,212,255,.05);border-top:1px solid var(--brd)}
.cs{display:flex;flex-direction:column;gap:.45rem}
.cb{background:var(--sur2);border:1px solid var(--brd);border-radius:3px;padding:.72rem .85rem;color:var(--tx);font-family:"DM Sans",sans-serif;font-size:.9rem;cursor:pointer;text-align:left;display:flex;align-items:flex-start;gap:.6rem;width:100%;-webkit-appearance:none;transition:border-color .15s,background .15s}
.cb:active:not([disabled]){background:rgba(0,212,255,.1)}
.cl{font-family:"Space Mono",monospace;font-size:.62rem;color:var(--acc);min-width:1rem;margin-top:.18rem;opacity:.7;flex-shrink:0}
.cb.ok{border-color:var(--ok)!important;background:rgba(0,255,157,.1)!important;color:var(--ok)!important}
.cb.no{border-color:var(--no)!important;background:rgba(255,77,109,.1)!important;color:var(--no)!important}
.fw{display:flex;flex-direction:column;gap:.55rem}
.fi{background:var(--sur2);border:1px solid var(--brd);border-radius:3px;padding:.68rem .85rem;color:var(--tx);font-size:.9rem;width:100%;outline:none;-webkit-appearance:none;font-family:"DM Sans",sans-serif;transition:border-color .15s}
.fi:focus{border-color:var(--acc)}
.fi.ok{border-color:var(--ok);background:rgba(0,255,157,.07)}
.fi.no{border-color:var(--no);background:rgba(255,77,109,.07)}
.fs{align-self:flex-start;background:transparent;border:1px solid var(--acc);color:var(--acc);font-family:"Space Mono",monospace;font-size:.65rem;letter-spacing:.1em;padding:.42rem 1rem;border-radius:2px;cursor:pointer;-webkit-appearance:none}
.fs:active:not([disabled]){background:var(--acc);color:var(--bg)}
.fb{margin-top:.75rem;padding:.65rem .85rem;border-radius:3px;font-size:.84rem;line-height:1.5;display:none}
.fb.show{display:block}
.fb.ok{background:rgba(0,255,157,.08);border:1px solid rgba(0,255,157,.2);color:var(--ok)}
.fb.no{background:rgba(255,77,109,.08);border:1px solid rgba(255,77,109,.2);color:#ff9eb0}
.sbw{text-align:center;margin-top:1.8rem;padding-bottom:1rem}
.sbtn{background:linear-gradient(135deg,var(--acc),var(--ac3));border:none;color:var(--bg);font-family:"Space Mono",monospace;font-size:.72rem;font-weight:700;letter-spacing:.14em;padding:.85rem 2rem;border-radius:2px;cursor:pointer;-webkit-appearance:none;box-shadow:0 0 18px rgba(0,212,255,.2)}
#sc{display:none;text-align:center;padding:2.2rem 1.4rem;background:var(--sur);border:1px solid var(--brd);border-radius:4px;margin-top:.9rem}
.sp{font-family:"Space Mono",monospace;font-size:clamp(2.2rem,9vw,4rem);font-weight:700;line-height:1;margin-bottom:.35rem}
.sp.gr{color:var(--ok);text-shadow:0 0 22px rgba(0,255,157,.4)}
.sp.md{color:#ffd166;text-shadow:0 0 22px rgba(255,209,102,.4)}
.sp.bd{color:var(--no);text-shadow:0 0 22px rgba(255,77,109,.4)}
.ss{font-family:"Space Mono",monospace;font-size:.68rem;color:var(--mu);letter-spacing:.14em;text-transform:uppercase;margin-bottom:1rem}
.sr{display:flex;justify-content:center;gap:2rem;margin:1rem 0}
.st .n{font-family:"Space Mono",monospace;font-size:1.3rem;font-weight:700}
.st .n.c{color:var(--ok)}.st .n.w{color:var(--no)}
.st .l{font-size:.72rem;color:var(--mu);margin-top:.12rem}
.sm{font-size:.92rem;color:var(--mu);max-width:320px;margin:.7rem auto;line-height:1.55}
.rb{margin-top:1.3rem;background:transparent;border:1px solid var(--acc);color:var(--acc);font-family:"Space Mono",monospace;font-size:.68rem;letter-spacing:.14em;padding:.65rem 1.6rem;border-radius:2px;cursor:pointer;-webkit-appearance:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="tag">Nursing Education</div>
    <h1>Basic <em>Dysrhythmia</em><br>Interpretation Quiz</h1>
    <p class="sub">Heart anatomy &middot; EKG waveforms &middot; Rhythm identification &middot; Treatments</p>
    <svg class="ecgl" viewBox="0 0 400 32" fill="none">

    </svg>
  </div>
  <div class="pr"><span id="pt">0 of 0 answered</span><span id="pp">0%</span></div>
  <div class="pb"><div class="pf" id="pf"></div></div>
  <div id="qb"></div>
  <div class="sbw" id="sbw" style="display:none">
    <button class="sbtn" id="sbt">&#9889; SCORE MY QUIZ</button>
  </div>
  <div id="sc">
    <div class="sp" id="spp"></div>
    <div class="ss">Final Score</div>
    <p class="sm" id="smm"></p>
    <div class="sr">
      <div class="st"><div class="n c" id="sco"></div><div class="l">Correct</div></div>
      <div class="st"><div class="n w" id="swr"></div><div class="l">Incorrect</div></div>
    </div>
    <button class="rb" id="rbt">&#8634; RETAKE QUIZ</button>
  </div>
</div>

function onChoice() {

answered[i] = ci;

function doFill(i) {

var fsb = document.getElementById(“fs” + i);

var val = inp.value.trim().toLowerCase();
var q = Q[i];
var correct = (val === q.a.toLowerCase()) || (q.a.toLowerCase().indexOf(val) >= 0 && val.length >= 3);
answered[i] = correct ? “c” : “w”;
inp.disabled = true;
fsb.disabled = true;
var fb = document.getElementById(“fb” + i);
fb.classList.add(“show”);
if (correct) {
inp.classList.add(“ok”);
fb.classList.add(“ok”);
fb.innerHTML = “<strong>✓ Correct!</strong> “ + q.x;
document.getElementById(“c” + i).classList.add(“ok”);
} else {
